name: CI

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  linters:
    name: Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: ./.github/workflows/util/setup_python

      - name: Pre-commit cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: ci-pre-commit-cache-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run -v --show-diff-on-failure --color=always --all-files

  type-check:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    name: Type Checks - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/workflows/util/setup_python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run mypy
        run: mypy --config-file linters/mypy.toml .

      - name: Run ty
        run: ty check --project . --config-file linters/ty.toml

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        # Sparse cross: every Postgres major on the newest Python, plus every other
        # Python on the default Postgres (18). The PG-18 x 3.14 cell is shared.
        include:
          - python-version: "3.14"
            pg-version: "14"
          - python-version: "3.14"
            pg-version: "15"
          - python-version: "3.14"
            pg-version: "16"
          - python-version: "3.14"
            pg-version: "17"
          - python-version: "3.14"
            pg-version: "18"
          - python-version: "3.10"
            pg-version: "18"
          - python-version: "3.11"
            pg-version: "18"
          - python-version: "3.12"
            pg-version: "18"
          - python-version: "3.13"
            pg-version: "18"

    name: Unit Tests - Python ${{ matrix.python-version }} - Postgres ${{ matrix.pg-version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/workflows/util/setup_python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        env:
          PGMIG_TEST_PG_VERSION: ${{ matrix.pg-version }}
        run: pytest --showlocals -c tests/pytest.ini tests

  check:
    name: Check All
    if: always()
    needs: [linters, type-check, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
