# Configuration file for running unit tests with coverage measurement.
# References:
# 1. https://pytest-cov.readthedocs.io/en/latest/config.html
# 2. https://coverage.readthedocs.io/en/v4.5.x/config.html

[pytest]
# Execution options.
addopts =
    # Disable unused plugins to avoid overhead.
    -p no:anyio

    # Show slowest tests.
    --durations=5

    # Stop after X failures.
    --maxfail=5

    # Coverage configuration
    --cov-branch
    --cov-config=tests/pytest.ini
    --cov=src/pgmig
    --cov-report=term-missing:skip-covered
    --no-cov-on-fail
    --cov-fail-under=100

    # Run verbose, useful for seeing full assert information.
    -v

# Asyncio configuration.
# https://pytest-asyncio.readthedocs.io/en/stable/reference/configuration.html
# Share one event loop across fixtures and tests: asyncpg binds connections to the loop that
# created them, so session-scoped connection fixtures must run in the same loop as the tests.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
asyncio_mode = auto

# Configuration of the underlying coverage.py application
[run]

[report]
# Regexes for lines to exclude from reports.
exclude_lines =
    if TYPE_CHECKING:
    raise PgmigUnsupportedError
    \.\.\.$
    if __name__ == .__main__.:

# Multi-line regexes to exclude from reports.
# See: https://github.com/nedbat/coveragepy/issues/1797
exclude_also =
    case _:\n\s*assert_never\(
    case _:\n\s*raise PgmigUnsupportedError
