# Configuration file for running unit tests with coverage measurement.
# References:
# 1. https://pytest-cov.readthedocs.io/en/latest/config.html
# 2. https://coverage.readthedocs.io/en/v4.5.x/config.html

# Pytest configuration.
[pytest]
# Python path.
pythonpath=..

# Execution options.
addopts =
    # Coverage configuration
    --cov-branch
    --cov-config=tests/pytest.ini
    --cov=pgmig
    --cov-report=term-missing:skip-covered
    --cov-fail-under=100
    --no-cov-on-fail

    # Run verbose, useful for seeing full assert information.
    -v

# Configuration of the underlying coverage.py application
[run]

[report]
# Regexes for lines to exclude from reports.
exclude_lines =
    if TYPE_CHECKING:
    raise NotImplementedError
    \.\.\.$
    if __name__ == .__main__.:

# Multi-line regexes to exclude from reports.
# See: https://github.com/nedbat/coveragepy/issues/1797
exclude_also =
    case _:\n\s*assert_never\(
    case _:\n\s*raise NotImplementedError
