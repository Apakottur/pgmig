; PgBouncer config for the test suite. Fronts the test Postgres so the suite can
; exercise pgmig against a connection pooler. Transaction pooling is the strict mode
; that rejects server-side startup options (-c ...), which is exactly the scenario the
; introspection connection must avoid.
[databases]
; Wildcard: route every database name (the suite creates dynamically named per-branch
; databases) to the backing Postgres.
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
pool_mode = transaction
; Plain-text client auth against userlist.txt; the same password is used to authenticate
; to Postgres (scram). Test-only throwaway credentials.
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
max_client_conn = 100
default_pool_size = 20
