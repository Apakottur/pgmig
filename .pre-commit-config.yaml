default_language_version:
  python: python3.14
repos:
  ###########
  # GENERAL #
  ###########
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.4
    hooks:
      - id: toml-sort
        files: pyproject.toml
        args: [--in-place, --ignore-case, --trailing-comma-inline-array]
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        args: [--config, ./linters/taplo.toml]
      - id: taplo-lint
        args: [--config, ./linters/taplo.toml]
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['--config-file', './linters/yamllint.yaml']
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.1
    hooks:
      - id: cspell
        exclude: \.(csv|json|txt|lock)$
        args: ["lint", "-c", "./linters/cspell.json", "--no-progress",
               "--cache", "--cache-location", "./linters/.cspellcache"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  ##########
  # PYTHON #
  ##########
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--config, ./linters/ruff.toml]
      - id: ruff-format
        args: [--config, ./linters/ruff.toml]
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: ["--ignore-decorators",
               "@pytest.fixture,@app.callback,@app.command",
               "--ignore-names",
               "pytest_*",
               "src",
               "tests"
        ]
  #######
  # SQL #
  #######
  - repo: https://github.com/darold/pgFormatter
    rev: v5.10
    hooks:
      - id: pg_format
        args: ["--inplace", "--wrap-limit", "120"]
        files: '\.sql$'
