[build-system]
build-backend = "hatchling.build"
requires = ["hatchling", "hatch-vcs"]

[dependency-groups]
dev = [
  "httpx==0.28.1",
  "mypy==2.2.0",
  "pre-commit==4.6.0",
  "pytest-cov==7.1.0",
  "pytest-mock==3.15.1",
  "pytest==9.1.1",
  "ruff==0.15.21",
  "shpyx==0.0.37",
  "ty==0.0.58",
]

[project]
name = "pgmig"
dynamic = ["version"]
description = "Generate migrations between Postgres databases"
authors = [{name = "Yossi Rozantsev"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"
keywords = ["postgres", "postgresql", "migrations", "database", "schema"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]

[project.urls]
homepage = "https://github.com/Apakottur/pgmig"
repository = "https://github.com/Apakottur/pgmig"
documentation = "https://github.com/Apakottur/pgmig"

[tool.hatch.version]
source = "vcs"

[tool.uv]
package = true
